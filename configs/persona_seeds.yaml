# Persona seeds: (role, location, year) triples + coarse era/region tags.
# knows / must_not_know are intentionally EMPTY here; src/build_configs.py fills them
# with a frontier teacher pass. Years are all AD (CE) so the "after year N" boundary
# renders cleanly and the judge can grade it reliably.
#
# 30 train personas + 10 held-out (eval) personas. The held-out years deliberately fall
# BETWEEN training years (interpolation) with different roles/regions, to test whether the
# boundary skill generalizes rather than being memorized per persona.
schema_version: v1
